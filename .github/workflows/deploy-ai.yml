name: Deploy — Python AI to Render

on:
  push:
    branches: [main]
    paths:
      - "ai/**"
      - ".github/workflows/deploy-ai.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ai
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4

      - name: Wait for CI — Python
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Test (pytest)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success

      - name: Trigger Render deployment for AI
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_AI }}")
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "❌ Render deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "✅ Render deployment triggered successfully"

      - name: Health check Python AI
        run: |
          echo "⏳ Waiting 60s for deployment to stabilize..."
          sleep 60
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.PYTHON_AI_URL }}/health" --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "✅ Python AI health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i failed (HTTP $STATUS), retrying in 15s..."
            sleep 15
          done
          echo "❌ Python AI health check failed"
          exit 1

      - name: Notify Telegram — Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ *BOTBINANCE AI Deployed*%0A%0ABranch: \`main\`%0ACommit: \`${{ github.sha }}\`" \
            -d parse_mode="Markdown"

      - name: Notify Telegram — Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ *BOTBINANCE AI Deploy FAILED*%0ACheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="Markdown"
