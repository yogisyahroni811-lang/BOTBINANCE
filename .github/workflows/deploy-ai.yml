name: Deploy — Python AI to Render

on:
  push:
    branches: [main]
    paths:
      - "ai/**"
      - ".github/workflows/deploy-ai.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ai
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deployment for AI
        run: |
          echo "Triggering hook..."
          # Print the URL masked length to verify it's passed
          echo "Hook URL length: ${#HOOK_URL}"
          
          # Run curl printing body and status
          cat <<EOF > curl-format.txt
          %{http_code}
          EOF
          
          curl -s -w "\n%{http_code}\n" -X POST "${HOOK_URL}" > response_body.txt
          RESPONSE=$(tail -n 1 response_body.txt | tr -d '\r\n')
          
          echo "Response HTTP Code: $RESPONSE"
          echo "Response Body:"
          cat response_body.txt
          
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "❌ Render deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "✅ Render deployment triggered successfully"
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_AI }}


