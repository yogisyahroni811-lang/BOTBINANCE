name: Deploy — Rust Core to Render

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "Dockerfile.core"
      - ".github/workflows/deploy-core.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

concurrency:
  group: deploy-core
  cancel-in-progress: false  # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Build & Deploy to Render
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ── Wait for CI to pass first ──────────────────────────
      - name: Wait for CI — Rust
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Build Release"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          allowed-conclusions: success

      # ── Deploy via Render Deploy Hook ─────────────────────
      - name: Trigger Render deployment
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_CORE }}")
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "❌ Render deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "✅ Render deployment triggered successfully"

      # ── Health check after deploy ─────────────────────────
      - name: Wait & health check
        run: |
          echo "⏳ Waiting 60s for deployment to stabilize..."
          sleep 60
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_CORE_URL }}/health" --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i failed (HTTP $STATUS), retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      # ── Notify via Telegram ───────────────────────────────
      - name: Notify Telegram — Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ *BOTBINANCE Core Deployed*%0A%0ABranch: \`main\`%0ACommit: \`${{ github.sha }}\`%0ABy: ${{ github.actor }}" \
            -d parse_mode="Markdown"

      - name: Notify Telegram — Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ *BOTBINANCE Core Deploy FAILED*%0A%0ACommit: \`${{ github.sha }}\`%0ACheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="Markdown"
